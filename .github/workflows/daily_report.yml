name: Daily Profit Report # discovery trigger

on:
  # Run every day at 19:30 UTC = 5:30 AM AEST (UTC+10)
  # Note: During AEDT (Oct-Apr, UTC+11) this runs at 6:30 AM AEDT
  schedule:
    - cron: '30 19 * * *'

  # Manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  profit-report:
    name: Generate & Send Daily Profit Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Write .env file from GitHub Secrets
      - name: Write .env from secrets
        run: |
          cat > .env << 'EOF'
          SHOPIFY_STORE_URL=${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          FACEBOOK_ACCESS_TOKEN=${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_AD_ACCOUNT_ID=${{ secrets.FACEBOOK_AD_ACCOUNT_ID }}
          KLAVIYO_API_KEY=${{ secrets.KLAVIYO_API_KEY }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          REPORT_EMAIL=${{ secrets.REPORT_EMAIL }}
          ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
          COGS_PER_ORDER=${{ secrets.COGS_PER_ORDER }}
          SHIPPING_PER_ORDER=${{ secrets.SHIPPING_PER_ORDER }}
          PAYMENT_FEE_PCT=${{ secrets.PAYMENT_FEE_PCT }}
          PAYMENT_FEE_FIXED=${{ secrets.PAYMENT_FEE_FIXED }}
          KLAVIYO_ATTRIBUTION_DAYS=5
          GOOGLE_CREDENTIALS_PATH=credentials.json
          GOOGLE_TOKEN_PATH=token.json
          EOF

      # 5. Generate fresh Google token.json at runtime (self-healing, never expires)
      #    Uses refresh_token + client credentials to get a brand-new access_token
      - name: Generate Google token.json
        env:
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python - <<'PYEOF'
          import json, os, requests
          from datetime import datetime, timezone, timedelta
          r = requests.post("https://oauth2.googleapis.com/token", data={
              "client_id":     os.environ["GOOGLE_CLIENT_ID"],
              "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
              "refresh_token": os.environ["GOOGLE_REFRESH_TOKEN"],
              "grant_type":    "refresh_token",
          }).json()
          if "access_token" not in r:
              raise RuntimeError(f"Token refresh failed: {r}")
          # Compute expiry (Google returns expires_in in seconds)
          expires_in = r.get("expires_in", 3600)
          expiry = (datetime.now(timezone.utc) + timedelta(seconds=expires_in)).strftime("%Y-%m-%dT%H:%M:%S.%fZ")
          token = {
              "token":         r["access_token"],
              "refresh_token": os.environ["GOOGLE_REFRESH_TOKEN"],
              "token_uri":     "https://oauth2.googleapis.com/token",
              "client_id":     os.environ["GOOGLE_CLIENT_ID"],
              "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
              "scopes": [
                  "https://www.googleapis.com/auth/spreadsheets",
                  "https://www.googleapis.com/auth/drive.file",
                  "https://www.googleapis.com/auth/gmail.send",
              ],
              "expiry": expiry,
          }
          json.dump(token, open("token.json", "w"))
          # Also write credentials.json so InstalledAppFlow fallback works
          creds = {"installed": {
              "client_id":     os.environ["GOOGLE_CLIENT_ID"],
              "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
              "token_uri":     "https://oauth2.googleapis.com/token",
              "auth_uri":      "https://accounts.google.com/o/oauth2/auth",
              "redirect_uris": ["http://localhost"],
          }}
          json.dump(creds, open("credentials.json", "w"))
          print("Fresh token.json + credentials.json generated successfully.")
          PYEOF

      # 7. Run the daily profit report pipeline
      - name: Run daily profit report
        env:
          PYTHONUTF8: "1"
        run: python execution/run_daily_report.py

      # 8. Upload logs on failure for debugging
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: .tmp/
          retention-days: 7
